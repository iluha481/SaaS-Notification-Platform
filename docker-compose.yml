version: '3.9'

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: notification_nginx
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: ./docker/php-fpm/Dockerfile
    container_name: notification_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: true

      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notification_service
      DB_USERNAME: laravel
      DB_PASSWORD: secret

      REDIS_HOST: redis
      REDIS_PORT: 6379

      QUEUE_CONNECTION: rabbitmq

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  queue-worker:
    build:
      context: .
      dockerfile: ./docker/php-fpm/Dockerfile
    container_name: notification_worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=5 --sleep=3 --timeout=60
    volumes:
      - ./src:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  scheduler:
    build:
      context: .
      dockerfile: ./docker/php-fpm/Dockerfile
    container_name: notification_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./src:/var/www/html
    depends_on:
      - app
    networks:
      - backend

  postgres:
    image: postgres:17-alpine
    container_name: notification_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d notification_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:8-alpine
    container_name: notification_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: notification_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

networks:
  backend:

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: